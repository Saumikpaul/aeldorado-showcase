[build]
  base = "frontend"
  publish = "."

[[edge_functions]]
  path = "/news"
  function = "news-ssr"

[[edge_functions]]
  path = "/news/*"
  function = "news-post-ssr"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
